{% extends 'base.html' %}

{% block title %}Task Details - ToDo App{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h3 class="mb-0">{{ task.title }}</h3>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <strong>Status:</strong>
                    <span class="badge bg-info">{{ task.status }}</span>
                </div>
                <div class="mb-3">
                    <strong>Notes:</strong>
                    <p>{{ task.notes }}</p>
                </div>
                <div class="mb-3">
                    <strong>Last Updated:</strong>
                    <p>{{ task.updated_at }}</p>
                </div>
            </div>
            <div class="card-footer">
                <a href="{% url 'task:edit-task' task.id %}" class="btn btn-primary">Edit Task</a>
                <a href="{{ back_to_url }}" class="btn btn-secondary">Back to Tasks</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
