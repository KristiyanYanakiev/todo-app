{% extends 'base.html' %}

{% block title %}Password Reset Complete - ToDo App{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="alert alert-success">
            <h4 class="alert-heading">Password Reset Complete</h4>
            <p>Your new password has been set. You can now log in with your new password.</p>
        </div>
        <div class="text-center">
            <a href="{% url 'accounts:login' %}" class="btn btn-primary">Go to Login</a>
        </div>
    </div>
</div>
{% endblock %}
