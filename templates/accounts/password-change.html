{% extends 'base.html' %}

{% block title %}Change Password - ToDo App{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-header">
                <h3 class="mb-0">Change Password</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            {{ field.label_tag }}
                            {{ field }}
                            {% if field.errors %}
                                <div class="alert alert-danger mt-2">
                                    {{ field.errors }}
                                </div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary w-100">Update Password</button>
                </form>
            </div>
            <div class="card-footer text-center">
                <a href="{% url 'common:home' %}">Back to Home</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
