{% extends 'base.html' %}

{% block title %}Email Sent - ToDo App{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="alert alert-success">
            <h4 class="alert-heading">Email Sent</h4>
            <p>We've emailed you instructions for setting your password. You should receive it shortly.</p>
            <hr>
            <p class="mb-0">If you don't see the email, please check your spam folder.</p>
        </div>
        <div class="text-center">
            <a href="{% url 'common:home' %}" class="btn btn-primary">Back to Home</a>
        </div>
    </div>
</div>
{% endblock %}
